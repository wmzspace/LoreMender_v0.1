<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0604" />
    <title>典故修补者 · 青囊残卷 · The Lore Mender</title>

    <!-- 启动 LOGO 提前预取,让内联加载屏的 Logo 尽早出现 -->
    <link rel="preload" as="image" href="/images/logo_studio.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google 字体改为「非阻塞 + swap」:不再阻塞首屏绘制,文字先用系统字体显示,字体到位后再替换。 -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      />
    </noscript>

    <!-- 内联首屏加载屏:不依赖 JS / 外部字体,HTML 一解析就立刻绘制,
         玩家在 414KB 主包下载完之前就能看到「典故记载中…」。React 挂载后由它无缝接管再淡出。 -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 50% -6%, rgba(205, 178, 119, 0.07), transparent 54%),
          linear-gradient(180deg, #090c10 0%, #070a0d 55%, #05070a 100%);
        /* 用系统衬线字体,绝不依赖 Google 字体——文字永远即时可见,无 FOIT 空白 */
        font-family: "Songti SC", "STSong", "SimSun", "Noto Serif CJK SC", serif;
        transition: opacity 420ms ease;
        will-change: opacity;
      }
      #boot-splash.is-out {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .bs-logo {
        width: clamp(220px, 56vmin, 340px);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 26px rgba(236, 220, 166, 0.26));
        animation: bsLogoIn 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #boot-splash .bs-sub {
        margin-top: 20px;
        font-size: 22px;
        letter-spacing: 0.5em;
        text-indent: 0.5em;
        color: #ecdca6;
        opacity: 0.68;
        animation: bsRiseIn 600ms ease 320ms both;
      }
      #boot-splash .bs-loading {
        margin-top: 44px;
        min-height: 28px;
        display: flex;
        align-items: baseline;
        justify-content: center;
        font-size: 18px;
        letter-spacing: 0.28em;
        text-indent: 0.28em;
        color: #ecdca6;
        animation: bsRiseIn 600ms ease 600ms backwards, bsPulse 1.8s ease-in-out 1200ms infinite;
      }
      #boot-splash .bs-dots {
        display: inline-block;
        width: 1.6em;
        text-align: left;
        letter-spacing: 0;
        text-indent: 0;
      }
      #boot-splash .bs-dots::after {
        content: "";
        animation: bsDots 1.4s steps(1, end) infinite;
      }
      @keyframes bsLogoIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
      @keyframes bsRiseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes bsPulse { 0%, 100% { opacity: 0.78; } 50% { opacity: 1; } }
      @keyframes bsDots { 0% { content: "·"; } 25% { content: "··"; } 50% { content: "···"; } 75%, 100% { content: ""; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="boot-splash">
      <img class="bs-logo" src="/images/logo_studio.webp" alt="拾遗工作室" />
      <div class="bs-sub">出 品</div>
      <div class="bs-loading">典 故 记 载 中<span class="bs-dots"></span></div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
